server:
  port: 8081

spring:
  config:
    import:
      - optional:file:./application-local.yaml
  application:
    name: enpenseSystem
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/enpenseSystem?useSSL=false&serverTimezone=UTC&characterEncoding=utf8}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-aliases-package: com.enpenseSystem.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.enpenseSystem: debug
